<!DOCTYPE html>
<html>
<body>
    <h2>JavaScript Array methods</h2>
    <h2>Join() and pop() </h2>

    <p>The join method joins all array elements into a string and the pop() method removes the last element from an array.</p>
    <p id="myjoin"></p>
    <p id="mypop"></p>
    <p id="mysecondpop"></p>
    <script>
        var fruits = ["Banana", "Orange", "Apple", "Mango"];
        document.getElementById("myjoin").innerHTML = fruits.join(" * ");
        document.getElementById("mypop").innerHTML = fruits.pop();
        document.getElementById("mysecondpop").innerHTML = fruits;

    </script>
</body>
</html>
